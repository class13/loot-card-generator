<svg xmlns="http://www.w3.org/2000/svg" width="400" height="600">
  <defs>
    <filter id="paper" x="0%" y="0%" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.9 0.6" numOctaves="4"
                    seed="2" stitchTiles="stitch" result="noise"/>
      <feColorMatrix type="matrix"
        values="0.3 0 0 0 0.6
                0   0.2 0 0 0.4
                0   0 0.1 0 0.2
                0   0 0   0.4 0"
        in="noise" result="colored"/>
      <feBlend in="SourceGraphic" in2="colored" mode="multiply" result="blend"/>
    </filter>
    <radialGradient id="vignette" cx="50%" cy="50%" r="75%">
      <stop offset="0%"   stop-color="rgba(230,200,140,0)"/>
      <stop offset="80%"  stop-color="rgba(140,90,20,0.15)"/>
      <stop offset="100%" stop-color="rgba(80,40,0,0.55)"/>
    </radialGradient>
    <linearGradient id="aged-top" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="rgba(100,60,10,0.2)"/>
      <stop offset="15%" stop-color="rgba(100,60,10,0)"/>
    </linearGradient>
    <linearGradient id="aged-bottom" x1="0" y1="0" x2="0" y2="1">
      <stop offset="85%" stop-color="rgba(100,60,10,0)"/>
      <stop offset="100%" stop-color="rgba(100,60,10,0.2)"/>
    </linearGradient>
  </defs>

  <!-- Base parchment colour -->
  <rect width="100%" height="100%" fill="#dfc89a"/>

  <!-- Subtle warm variation -->
  <rect width="100%" height="100%" fill="#e8d5a3" opacity="0.6"/>

  <!-- Paper texture via noise filter -->
  <rect width="100%" height="100%" fill="#c9a86c" opacity="0.5"
        filter="url(#paper)"/>

  <!-- Edge ageing -->
  <rect width="100%" height="100%" fill="url(#aged-top)"/>
  <rect width="100%" height="100%" fill="url(#aged-bottom)"/>

  <!-- Vignette -->
  <rect width="100%" height="100%" fill="url(#vignette)"/>
</svg>
