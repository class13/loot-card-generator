  - name: Vorpal Longsword +3
    rarity: legendary
    type: Weapon (longsword, requires attunement)
    description: |
      You gain **+3 to attack and damage rolls**. On a natural 20, the target
      must succeed on a DC 15 Constitution saving throw or be **decapitated**
      (if it has a head).
    flavor: It sings as it flies — one note, one silence.
    price: 50,000 gp
    icon: icons/003-vorpal-longsword-3.png
    category: weapon
    prompt: >-
      single fantasy weapon item, centered, isolated object, clean background, one subject, full object in frame, no
