  - name: Bag of Holding
    rarity: uncommon
    type: Wondrous Item
    description: |
      This bag has an interior space considerably larger than its outside dimensions.
      The bag can hold up to **500 pounds**, not exceeding a volume of 64 cubic feet.
      Retrieving an item requires an *action*.
    price: 1,000 gp
    category: artifact
