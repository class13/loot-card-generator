cards:
  - name: Sunfire Amulet
    rarity: rare
    type: Wondrous Item (requires attunement)
    description: |
      While attuned, you gain **resistance to fire damage**.
      Once per day, cast *Fireball* at 3rd level for free.
                                  # **double asterisks** → bold   *single* → italic
    flavor: Forged in the caldera of Mount Embros.
    price: 2,500 gp
    icon: icons/001-sunfire-amulet.png
    category: jewelry
    prompt: >-
      single fantasy jewelry item, centered, isolated object, clean background, one subject, full object in frame, no
      repeated elements, gold material, fiery red color, pendant shape, intricately crafted, flame motif, glowing
      gemstone, high detail, sharp focus, game asset illustration, studio lighting
