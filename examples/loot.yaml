      - attunement
  - name: Boots of the Phantom
    rarity: uncommon
    type: Wondrous Item
    description: |
      Your movement speed increases by 10 ft.
      You leave no tracks in natural terrain and can walk on water for up to
      *10 minutes per day* (no concentration required).
    flavor: The thief danced on the lake's surface as the guards searched the shore.
    price: 800 gp
    icon: icons/002-boots-of-the-phantom.png
    category: other
    prompt: >-
      single fantasy wondrous item, centered, isolated object, clean background, one subject, full object in frame, no
