  - name: Staff of the Magi
    rarity: legendary
    type: Staff (requires attunement by a sorcerer, warlock, or wizard)
    description: |
      This staff has **50 charges** and regains 4d6 + 2 charges daily at dawn.
      Expend 1 or more charges to cast: *Magic Missile* (1), *Web* (2),
      *Fireball* (3), *Cone of Cold* (5), *Wall of Fire* (4).
    flavor: It remembers every spell ever channelled through it.
    price: 100,000 gp
    category: tool
